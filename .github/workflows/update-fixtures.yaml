name: Update Fixtures
on:
  pull_request:
    types: [opened, labeled]

jobs:
  regenerate:
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'update fixtures') ||
      (github.event.action == 'opened' && contains(github.event.pull_request.labels.*.name, 'update fixtures'))
    runs-on: ubuntu-latest
    container:
      image: registry.cern.ch/root-ci/ubuntu2410:buildready
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ github.token }}

      - name: Regenerate expected JSON, metadata, and manifest
        run: python tools/build_manifest_and_expected.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fixtures/ manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Regenerate fixtures and manifest"
            git push
          fi
