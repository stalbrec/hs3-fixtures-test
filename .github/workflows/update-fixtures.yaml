name: Generate Fixtures
on:
  pull_request:
    types: [labeled]

jobs:
  determine-jobs:
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'generate fixtures') ||
      (github.event.action == 'opened' && contains(github.event.pull_request.labels.*.name, 'generate fixtures'))
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.read-metadata.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4      
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name}}
          token: ${{ github.token }}
          fetch-depth: 0
      - name: fetch base commit
        run: |
          git remote add upstream "https://github.com/${{ github.repository }}.git"
          git fetch upstream "${{ github.event.pull_request.base.sha}}"

      - name: read-metadata
        id: read-metadata
        run: |
            mapfile -t hs3_files < <(git diff --diff-filter d --name-only \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} \
            -- 'fixtures/*/hs3.json')

            echo 'found new hs3.json files:'
            echo ${hs3_files[@]}

            mapfile -t metadata_files < <(git diff --diff-filter d --name-only \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} \
            -- 'fixtures/*/metadata.json')

            echo 'found new metadata.json files:'
            echo ${hs3_files[@]}

            dirs_from_hs3=$(printf '%s\n' "${hs3_files[@]}" | xargs -n1 dirname | sort -u)
            dirs_from_metadata=$(printf '%s\n' "${metadata_files[@]}" | xargs -n1 dirname | sort -u)

            missing_metadata=$(comm -23 <(echo "$dirs_from_hs3" | sort) <(echo "$dirs_from_metadata" | sort))
            extra_metadata=$(comm -13 <(echo "$dirs_from_hs3" | sort) <(echo "$dirs_from_metadata" | sort))

            if [ -n "${missing_metadata}" ]; then
              echo "ERROR: Testcase(s) with hs3.json but without metadata.json:"
              echo "${missing_metadata}"
              exit 1
            fi
            
            if [ -n "${extra_metadata}" ]; then
              echo "ERROR: Testcase(s) with metadata.json but without hs3.json:"
              echo "${extra_metadata}"
              exit 1
            fi
            matrix=$(printf '%s\n' "${dirs_from_hs3[@]}" | xargs -n1 -I % jq  -c --arg dir "%" '{dir:$dir,  image: .reference_backend}' "%/metadata.json" | jq -sc .)

            echo "determined jobs matrix to be:"
            echo $matrix | jq 

            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
  generate:
    needs: determine-jobs
    if: (needs.determine-jobs.result == 'success') &&
        (needs.determine-jobs.outputs.matrix != '[]')
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJSON(needs.determine-jobs.outputs.matrix) }}
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.image }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Generate fixtures
        id: generate-fixtures
        shell: bash
        run: |
          set -euo pipefail
          echo "Generating fixtures for ${{ matrix.dir }} using the reference backend image ${{ matrix.image }}"
          python3 /workspace/tools/build_manifest_and_expected.py -e -f /workspace/${{ matrix.dir }}

      - name: Commit and push generated fixtures
        working-directory: /workspace
        shell: bash
        run: |
          set -euo pipefail
          git config --global --add safe.directory /workspace
          git config user.name "hs3bot"
          git config user.email "hs3.services@cern.ch"
          git add "${{ matrix.dir }}" manifest.json
          if git diff --cached --quiet; then
            echo "Nothing to commit for ${{ matrix.dir }}"
            exit 0
          fi
          git commit -m "Generate fixtures for ${{ matrix.dir }}"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
